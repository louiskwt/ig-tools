<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Vocab • Instagram Carousel Exporter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    :root {
      --primary: #10b981;
    }
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
      font-weight: 600;
    }

    .slide-preview {
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4),
                  0 10px 10px -6px rgb(0 0 0 / 0.4);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide-preview:hover {
      transform: translateY(-2px);
    }

    .instagram-shadow {
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3),
                  0 4px 6px -4px rgb(0 0 0 / 0.3);
    }

    .nav-dot {
      transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .nav-dot.active {
      background-color: #eab308;
      width: 1.25rem;
    }

    .slide-card {
      transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .slide-card:hover {
      transform: translateX(4px);
      background-color: #1f2937;
    }

    .slide-card.active {
      background-color: #374151;
      border-color: #eab308;
    }

    .export-btn {
      transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    .export-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.3);
    }

    .section-header {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .worldcup-gradient {
      background: linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%);
    }

    .preview-container {
      background: #111827;
      padding: 16px;
      border-radius: 24px;
    }

    .html2canvas-fix * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="max-w-[1200px] mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between px-8 pt-8 pb-6">
      <div class="flex items-center gap-x-3">
        <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-inner">
          <span class="text-3xl">⚽</span>
        </div>
        <div>
          <h1 class="font-display text-3xl font-semibold tracking-tighter">World Cup Vocab</h1>
          <p class="text-emerald-400 text-sm -mt-1">Instagram Carousel PNG Exporter</p>
        </div>
      </div>
      
      <div class="flex items-center gap-x-2 text-sm">
        <div class="px-3 py-1.5 bg-zinc-900 rounded-2xl flex items-center gap-x-2 text-xs">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
          <span class="text-emerald-300 font-medium">1080×1080 • Ready for IG</span>
        </div>
        <div class="text-zinc-500 text-xs px-3">7 slides</div>
      </div>
    </div>

    <div class="px-8 pb-8">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- PREVIEW PANEL -->
        <div class="lg:col-span-7">
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <!-- Preview Header -->
            <div class="flex items-center justify-between mb-4 px-1">
              <div>
                <div class="section-header text-emerald-400">Live Preview</div>
                <div id="preview-title" class="font-semibold text-xl tracking-tight"></div>
              </div>
              <div class="text-right">
                <div id="preview-counter" 
                     class="inline-flex items-center justify-center bg-zinc-800 text-emerald-300 text-xs font-mono font-bold px-3 py-1 rounded-full">
                </div>
              </div>
            </div>

            <!-- Preview Area -->
            <div class="flex justify-center mb-5">
              <div id="preview-wrapper"
                   class="preview-container w-[500px] aspect-square rounded-3xl p-4 shadow-2xl ring-1 ring-white/10">
                <div id="preview" 
                     class="w-full h-full rounded-2xl overflow-hidden ring-1 ring-white/10 bg-zinc-950">
                  <!-- Slide content injected here via JS -->
                </div>
              </div>
            </div>

            <!-- Navigation -->
            <div class="flex items-center justify-between px-2">
              <!-- Arrows -->
              <div class="flex items-center gap-x-2">
                <button onclick="prevSlide()"
                        class="w-9 h-9 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 transition-colors rounded-2xl border border-zinc-700 text-zinc-400 hover:text-white">
                  <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <button onclick="nextSlide()"
                        class="w-9 h-9 flex items-center justify-center bg-zinc-800 hover:bg-zinc-700 active:bg-zinc-600 transition-colors rounded-2xl border border-zinc-700 text-zinc-400 hover:text-white">
                  <i class="fa-solid fa-chevron-right text-sm"></i>
                </button>
              </div>

              <!-- Dots -->
              <div class="flex items-center gap-x-1.5" id="dots-container">
                <!-- Populated by JS -->
              </div>

              <div class="text-xs text-zinc-500 font-mono w-12 text-right" id="slide-counter-text">
              </div>
            </div>

            <!-- Export Current Button -->
            <div class="mt-6 px-1">
              <button onclick="exportCurrentSlide()"
                      class="export-btn w-full flex items-center justify-center gap-x-3 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 transition-all text-white font-semibold py-3.5 rounded-2xl text-sm shadow-lg shadow-emerald-500/30">
                <i class="fa-solid fa-download"></i>
                <span>Export Current Slide as PNG (1080×1080)</span>
              </button>
              <p class="text-center text-[10px] text-zinc-500 mt-2">High-resolution • Instagram optimized</p>
            </div>
          </div>
        </div>

        <!-- SLIDES LIST -->
        <div class="lg:col-span-5">
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 h-full flex flex-col">
            <div class="flex items-center justify-between mb-4 px-1">
              <div>
                <div class="section-header text-emerald-400">All Slides</div>
                <div class="font-semibold text-lg tracking-tight">7 Instagram Posts</div>
              </div>
              <button onclick="exportAllSlides()"
                      class="flex items-center gap-x-2 text-xs font-semibold bg-zinc-800 hover:bg-emerald-900/70 active:bg-emerald-800 transition-colors px-4 py-2 rounded-2xl border border-zinc-700 hover:border-emerald-700 text-emerald-300">
                <i class="fa-solid fa-images text-xs"></i>
                <span>Export All</span>
              </button>
            </div>

            <!-- Slides List -->
            <div class="flex-1 overflow-auto space-y-1 pr-1 custom-scroll" id="slides-list">
              <!-- Populated dynamically by JS -->
            </div>

            <div class="pt-4 mt-auto border-t border-zinc-800 px-1">
              <div class="text-[10px] text-zinc-500 leading-snug">
                <strong class="text-emerald-400">Tip:</strong> Download in order • Upload to Instagram as carousel<br>
                First slide uses the new light gray &amp; white gradient
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-emerald-600 text-emerald-300 px-5 py-2.5 rounded-2xl text-sm font-medium shadow-xl flex items-center gap-x-2">
    <i class="fa-solid fa-check-circle"></i>
    <span id="toast-message"></span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    // Tailwind script
    function initializeTailwind() {
      document.documentElement.style.setProperty('--accent', '#10b981');
    }

    // Slide Data (exact copy from original - no text changes)
    const slides = [
      { id: 'cover', type: 'cover' },
      {
        id: 'hat-trick',
        num: '01',
        word: 'Hat-trick',
        phonetic: '/ˈhæt trɪk/',
        chinese: '帽子戲法',
        definition: '一場比賽連進三球',
        example: 'Messi scores a hat-trick against Algeria',
        chineseExample: '美斯對陣阿爾及利亞，完成帽子戲法',
        tip: '同一球員在同一場比賽進三球，即稱 hat-trick！',
        gradient: 'from-emerald-950 via-emerald-900 to-green-800',
      },
      {
        id: 'brace',
        num: '02',
        word: 'Brace',
        phonetic: '/breɪs/',
        chinese: '梅開二度',
        definition: '一場比賽進兩球',
        example: "Ueda's brace knocks Tunisia out of the 2026 World Cup",
        chineseExample: '上田綺世梅開二度，令突尼西亞從2026世界盃出局',
        tip: '進兩球叫 brace！常見於英式足球報導。',
        gradient: 'from-teal-950 via-teal-900 to-emerald-800',
      },
      {
        id: 'double',
        num: '03',
        word: 'Double',
        phonetic: '/ˈdʌbəl/',
        chinese: '連進兩球',
        definition: '可與 Brace 互用，指一場進兩球',
        example: "Haaland scored a double in Norway's World Cup opening match",
        chineseExample: '夏蘭德在挪威世界盃揭幕戰中連進兩球',
        tip: 'Double 與 Brace 同義，都指同一場比賽進兩球！',
        gradient: 'from-cyan-950 via-emerald-900 to-teal-800',
      },
      {
        id: 'stunner',
        num: '04',
        word: 'Stunner',
        phonetic: '/ˈstʌnər/',
        chinese: '世界波',
        definition: '令人驚嘆的精彩入球',
        example: "Mbappé scores a stunner, breaks France's goal record in Senegal win",
        chineseExample: '安巴比射入世界波，打破法國入球紀錄，法國勝塞內加爾',
        tip: '中文「世界波」完美對應英文 stunner — 全場震驚的一腳！',
        gradient: 'from-yellow-900 via-amber-900 to-orange-900',
      },
      {
        id: 'advance',
        num: '05',
        word: 'Advance',
        phonetic: '/ədˈvæns/',
        chinese: '晉級',
        definition: '在賽事中進入下一輪',
        example: 'United States beat Australia to advance to the World Cup knockout stages',
        chineseExample: '美國擊敗澳洲，成功晉級世界盃淘汰賽',
        tip: 'Advance to = 晉級至⋯，適用所有體育賽事報導！',
        gradient: 'from-blue-950 via-blue-900 to-emerald-900',
      },
      {
        id: 'qualify',
        num: '06',
        word: 'Qualify',
        phonetic: '/ˈkwɒlɪfaɪ/',
        chinese: '出線 ／ 取得資格',
        definition: '取得進入某階段的資格',
        example: 'Mexico is the first team to qualify for the World Cup knockout stages',
        chineseExample: '墨西哥率先出線，成為首支晉級世界盃淘汰賽的球隊',
        tip: 'Qualify for = 取得⋯資格，出線就用這個字！',
        gradient: 'from-green-950 via-emerald-900 to-teal-900',
      },
      { id: 'cta', type: 'cta' },
    ];

    let currentIndex = 0;

    // Generate Cover Slide HTML (Light gray + white gradient as requested)
    function getCoverHTML() {
      return `
        <div class="w-full h-full bg-gradient-to-br from-gray-100 via-white to-gray-200 flex flex-col items-center justify-center  text-center relative overflow-hidden">
          <!-- Decorative elements (adapted for light theme) -->
          <div class="absolute top-5 left-5 w-20 h-20 rounded-full border-2 border-emerald-300 opacity-40 pointer-events-none"></div>
          <div class="absolute bottom-8 right-5 w-28 h-28 rounded-full border-2 border-emerald-200 opacity-30 pointer-events-none"></div>
          <div class="absolute top-1/3 right-8 w-10 h-10 rounded-full border border-emerald-300 opacity-30 pointer-events-none"></div>
          
          <div class="text-6xl mb-8 drop-shadow-sm">⚽</div>
          
          <p class="text-emerald-600 text-xs font-bold tracking-[2px] uppercase mb-3">FIFA World Cup 2026</p>
          
          <h1 class="text-gray-900 text-4xl font-black leading-[1.05] mb-2 tracking-tighter">
            看世界盃<br>學英文
          </h1>
          
          <p class="text-emerald-700 text-base font-semibold mb-2">Learn English with the World Cup</p>
          <p class="text-gray-600 text-sm mb-7">6個必學世界盃英文詞彙</p>
          
          <div class="bg-emerald-600 hover:bg-emerald-700 shadow-lg shadow-emerald-500/30 text-white rounded-full px-8 py-4 text-base font-bold flex items-center gap-x-3 transition-all">
            <span class="leading-none -mt-4">向右滑動開始學習</span>
            <span class="text-xl leading-none -mt-4">👉🏼</span>
          </div>
        </div>
      `;
    }

    // Generate Vocab Slide HTML (unchanged content + original styling)
    function getVocabHTML(slide) {
      return `
        <div class="w-full h-full bg-gradient-to-br ${slide.gradient} flex flex-col justify-between p-5 relative overflow-hidden">
          <!-- Large background number -->
          <div class="absolute right-2 top-1/2 -translate-y-1/2 text-white opacity-5 font-black text-[120px] leading-none select-none pointer-events-none font-display">
            ${slide.num}
          </div>
          
          <!-- Top bar -->
          <div class="flex items-center justify-between z-10">
            <span class="text-emerald-200 text-[10px] font-bold px-3 py-1 rounded-full tracking-wider">⚽ World Cup Vocab</span>
            <span class="text-yellow-400 text-xs font-bold tabular-nums">${slide.num} / 06</span>
          </div>
          
          <!-- Main content -->
          <div class="text-center z-10">
            <div class="text-yellow-400 text-[42px] font-black tracking-[-1.5px] leading-none mb-1 font-display">${slide.word}</div>
            <div class="text-emerald-300 text-xs mb-2 font-mono tracking-widest mt-4">${slide.phonetic}</div>
            <div class="text-white text-2xl font-bold mb-2 tracking-tight mt-4">${slide.chinese}</div>
            
            <div class="inline-block backdrop-blur-sm rounded-full px-4 py-1">
              <span class="text-emerald-200 text-xs font-medium">${slide.definition}</span>
            </div>
          </div>
          
          <!-- Example box -->
          <div class="bg-black/30 backdrop-blur-md rounded-2xl px-3.5 py-7 space-y-2 border border-white/10 z-10">
            <div class="flex gap-2 items-start">
              <span class="text-yellow-400 text-xs shrink-0 mt-0.5">📌</span>
              <p class="text-white text-xs font-medium leading-relaxed italic">"${slide.example}"</p>
            </div>
            <p class="text-emerald-200 text-xs leading-relaxed pl-4">「${slide.chineseExample}」</p>
          </div>
          
          <!-- Tip -->
          <div class="bg-yellow-400/15 border border-yellow-400/20 rounded-xl px-3.5 py-7 z-10">
            <p class="text-yellow-300 text-xs leading-relaxed -mt-4">💡 ${slide.tip}</p>
          </div>
        </div>
      `;
    }

    // Generate CTA Slide HTML (unchanged)
    function getCTAHTML() {
      return `
        <div class="w-full h-full bg-gradient-to-br from-green-950 via-green-900 to-yellow-800 flex flex-col items-center justify-center p-8 text-center relative overflow-hidden">
          <div class="absolute top-5 right-5 w-20 h-20 rounded-full border-2 border-yellow-400 opacity-20 pointer-events-none"></div>
          <div class="absolute bottom-8 left-5 w-24 h-24 rounded-full border-2 border-green-400 opacity-10 pointer-events-none"></div>
          
          <div class="text-5xl mb-4">🌍</div>
          
          <p class="text-yellow-400 text-2xl font-black mb-1 tracking-tight">學會了嗎？</p>
          <p class="text-white text-base font-bold mb-5">Did you learn something new?</p>
          
          <div class="bg-white/10 border border-white/10 rounded-2xl p-4 mb-5 w-full max-w-[260px]">
            <p class="text-emerald-200 text-sm leading-relaxed font-medium">💾 儲存這篇，看球時派上用場！</p>
            <p class="text-emerald-300 text-xs mt-1">Save this post and use it during the matches!</p>
          </div>
          
          <p class="text-yellow-300 text-xs font-semibold mb-1">📲 Follow 我，每週學更多實用英文詞彙</p>
          <p class="text-emerald-300 text-xs mb-4">Follow for weekly English learning!</p>
        </div>
      `;
    }

    function getSlideHTML(slide) {
      if (slide.type === 'cover') return getCoverHTML();
      if (slide.type === 'cta') return getCTAHTML();
      return getVocabHTML(slide);
    }

    function getSlideTitle(slide) {
      if (slide.type === 'cover') return 'Cover — 看世界盃學英文';
      if (slide.type === 'cta') return 'Call to Action — 學到了嗎？';
      return `${slide.num} — ${slide.word} (${slide.chinese})`;
    }

    // Update preview
    function updatePreview() {
      const slide = slides[currentIndex];
      const previewEl = document.getElementById('preview');
      const titleEl = document.getElementById('preview-title');
      const counterEl = document.getElementById('preview-counter');
      const counterTextEl = document.getElementById('slide-counter-text');

      previewEl.innerHTML = getSlideHTML(slide);
      titleEl.textContent = getSlideTitle(slide);
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;
      counterTextEl.textContent = `${currentIndex + 1} of ${slides.length}`;

      // Update active states
      updateDots();
      updateSlidesListActive();
    }

    function updateDots() {
      const container = document.getElementById('dots-container');
      container.innerHTML = '';

      slides.forEach((_, index) => {
        const dot = document.createElement('button');
        dot.className = `nav-dot w-2 h-2 rounded-full ${index === currentIndex ? 'active bg-yellow-400 w-5' : 'bg-zinc-600 hover:bg-zinc-400'}`;
        dot.onclick = () => {
          currentIndex = index;
          updatePreview();
        };
        container.appendChild(dot);
      });
    }

    function updateSlidesListActive() {
      document.querySelectorAll('.slide-card').forEach((card, index) => {
        if (index === currentIndex) {
          card.classList.add('active', 'ring-1', 'ring-yellow-400/60');
        } else {
          card.classList.remove('active', 'ring-1', 'ring-yellow-400/60');
        }
      });
    }

    // Build the slides list in sidebar
    function buildSlidesList() {
      const container = document.getElementById('slides-list');
      container.innerHTML = '';

      slides.forEach((slide, index) => {
        const card = document.createElement('div');
        card.className = `slide-card flex items-center gap-x-3 px-3 py-3 rounded-2xl border border-transparent cursor-pointer group`;
        
        let iconHTML = '';
        let titleHTML = '';
        let subtitleHTML = '';

        if (slide.type === 'cover') {
          iconHTML = `<div class="w-9 h-9 flex-shrink-0 bg-gradient-to-br from-gray-200 to-white text-emerald-600 rounded-xl flex items-center justify-center text-xl shadow-inner">⚽</div>`;
          titleHTML = `<div class="font-semibold text-sm">Cover Slide</div>`;
          subtitleHTML = `<div class="text-emerald-400 text-xs">看世界盃學英文</div>`;
        } else if (slide.type === 'cta') {
          iconHTML = `<div class="w-9 h-9 flex-shrink-0 bg-gradient-to-br from-green-800 to-yellow-800 text-white rounded-xl flex items-center justify-center text-lg">🌍</div>`;
          titleHTML = `<div class="font-semibold text-sm">Call to Action</div>`;
          subtitleHTML = `<div class="text-emerald-400 text-xs">學到了嗎？</div>`;
        } else {
          iconHTML = `<div class="w-9 h-9 flex-shrink-0 bg-zinc-800 text-yellow-400 rounded-xl flex items-center justify-center font-mono text-xs font-bold border border-zinc-700">${slide.num}</div>`;
          titleHTML = `<div class="font-semibold text-sm">${slide.word} <span class="text-emerald-400">· ${slide.chinese}</span></div>`;
          subtitleHTML = `<div class="text-zinc-400 text-xs line-clamp-1">${slide.definition}</div>`;
        }

        card.innerHTML = `
          <div class="flex items-center gap-x-3 flex-1 min-w-0">
            ${iconHTML}
            <div class="min-w-0 flex-1">
              ${titleHTML}
              ${subtitleHTML}
            </div>
          </div>
          
          <button class="export-btn opacity-70 group-hover:opacity-100 transition-all text-emerald-400 hover:text-emerald-300 px-3 py-1.5 text-xs font-semibold flex items-center gap-x-1.5"
                  onclick="event.stopImmediatePropagation(); exportSpecificSlide(${index})">
            <i class="fa-solid fa-download text-xs"></i>
            <span class="hidden xl:inline">PNG</span>
          </button>
        `;

        // Click whole card to preview
        card.onclick = () => {
          currentIndex = index;
          updatePreview();
        };

        container.appendChild(card);
      });
    }

    // Navigation
    function prevSlide() {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      updatePreview();
    }

    function nextSlide() {
      currentIndex = (currentIndex + 1) % slides.length;
      updatePreview();
    }

    // Export a single slide to PNG
    async function exportSlideToPNG(slideIndex, filename) {
      const slide = slides[slideIndex];
      
      // Create a high-resolution offscreen renderer (540px → scale 2 = 1080px)
      const renderer = document.createElement('div');
      renderer.style.position = 'fixed';
      renderer.style.left = '-99999px';
      renderer.style.top = '0';
      renderer.style.width = '540px';
      renderer.style.height = '540px';
      renderer.style.overflow = 'hidden';
      renderer.style.borderRadius = '24px';
      renderer.style.boxShadow = 'none';
      renderer.innerHTML = `
        <div class="w-full h-full" style="width: 540px; height: 540px; font-size: 16px;">
          ${getSlideHTML(slide)}
        </div>
      `;
      
      document.body.appendChild(renderer);

      try {
        const canvas = await html2canvas(renderer.firstElementChild, {
          scale: 2,                    // 540 * 2 = 1080px
          width: 540,
          height: 540,
          backgroundColor: null,
          logging: false,
          useCORS: true,
          allowTaint: true
        });

        // Download
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();

        showToast(`Exported: ${filename}`);
      } catch (err) {
        console.error(err);
        alert('Export failed. Please try again.');
      } finally {
        document.body.removeChild(renderer);
      }
    }

    function getFilenameForSlide(index) {
      const slide = slides[index];
      if (slide.type === 'cover') {
        return 'worldcup-01-cover.png';
      }
      if (slide.type === 'cta') {
        return 'worldcup-07-cta.png';
      }
      return `worldcup-${slide.num}-${slide.id}.png`;
    }

    async function exportCurrentSlide() {
      const filename = getFilenameForSlide(currentIndex);
      await exportSlideToPNG(currentIndex, filename);
    }

    async function exportSpecificSlide(index) {
      const filename = getFilenameForSlide(index);
      await exportSlideToPNG(index, filename);
    }

    async function exportAllSlides() {
      const btns = document.querySelectorAll('button');
      btns.forEach(b => b.disabled = true);

      showToast('Starting batch export... (7 files)');

      for (let i = 0; i < slides.length; i++) {
        const filename = getFilenameForSlide(i);
        await exportSlideToPNG(i, filename);
        // Small delay between downloads to avoid browser popup blocking
        await new Promise(resolve => setTimeout(resolve, 420));
      }

      btns.forEach(b => b.disabled = false);
      showToast('All 7 slides exported successfully!');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toast-message');
      msg.textContent = message;
      toast.classList.remove('hidden');
      toast.classList.add('flex');

      setTimeout(() => {
        toast.classList.remove('flex');
        toast.classList.add('hidden');
      }, 2600);
    }

    // Keyboard support
    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
          prevSlide();
        } else if (e.key === 'ArrowRight') {
          nextSlide();
        } else if (e.key.toLowerCase() === 'e' && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          exportCurrentSlide();
        }
      });
    }

    // Initialize everything
    function initialize() {
      initializeTailwind();
      
      // Initial preview
      updatePreview();
      
      // Build sidebar list
      buildSlidesList();
      
      // Keyboard
      setupKeyboard();
      
      // Initial active state on first card
      setTimeout(() => {
        const firstCard = document.querySelector('.slide-card');
        if (firstCard) firstCard.classList.add('active', 'ring-1', 'ring-yellow-400/60');
      }, 50);

      // Easter egg / helpful tip
      console.log('%c[World Cup Exporter] Ready. Press ← → to navigate. Cmd/Ctrl + E to export current.', 'color:#64748b');
    }

    // Boot app
    window.onload = initialize;
  </script>
</body>
</html>
